db_path: db/cloud_knowledge_development.db

esa:
  team: bist
  wip: true
  sources:
    aws_blog:    { category: development/cloud-trunk-changes/aws }
    gcp_blog:    { category: development/cloud-trunk-changes/gcp }
    gws_blog:    { category: development/cloud-trunk-changes/gws }
    gitlab_blog: { category: development/cloud-trunk-changes/gitlab }

models:
  classifier:       { provider: claude,       model: haiku }
  daily_summarizer: { provider: local_ollama, model: "gemma4:e2b" }
  default:          { provider: claude,       model: sonnet }
